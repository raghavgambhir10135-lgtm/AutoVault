<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AutoVault</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot"></div>

  <!-- Login Page -->
  <div class="login-page">
    <!-- Visual Panel -->
    <div class="login-visual">
      <div class="login-visual-fade"></div>
      <div class="login-visual-overlay">
        <div class="login-visual-brand">AUTOVAULT</div>
        <p class="login-visual-tagline">Premium Automotive Accessories</p>
      </div>
    </div>

    <!-- Form Panel -->
    <div class="login-form-panel">
      <div class="login-form-container">
        <!-- Tabs -->
        <div class="login-tabs">
          <button class="login-tab active" data-tab="signin">Sign In</button>
          <button class="login-tab" data-tab="register">Create Account</button>
        </div>

        <!-- Sign In Form -->
        <form class="login-form active" id="loginForm">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Enter your email">
            <span class="form-error">Please enter a valid email</span>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password">
            <span class="form-error">Password must be at least 8 characters</span>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="remember" checked>
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-link">Forgot Password?</a>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <!-- Register Form -->
        <form class="login-form" id="registerForm">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" placeholder="Enter your full name">
            <span class="form-error">Please enter your name</span>
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="Enter your email">
            <span class="form-error">Please enter a valid email</span>
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Create a password">
            <span class="form-error">Password must be at least 8 characters</span>
          </div>
          <div class="form-group">
            <label for="register-confirm">Confirm Password</label>
            <input type="password" id="register-confirm" placeholder="Confirm your password">
            <span class="form-error">Passwords do not match</span>
          </div>
          <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">OR</span>
          <div class="divider-line"></div>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <button class="btn-social btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>
          <button class="btn-social btn-facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
            Continue with Facebook
          </button>
        </div>

        <!-- Back to Home -->
        <p style="text-align:center;margin-top:32px;font-size:14px;color:var(--text-muted)">
          <a href="index.html" style="color:var(--primary)">&larr; Back to Home</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast"></div>

  <script src="js/script.js"></script>
</body>
</html>
